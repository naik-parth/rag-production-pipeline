name: RAG Production Pipeline Evaluation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  evaluate-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install pipeline dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install langgraph langchain-core langchain-community langchain-huggingface ragas nest_asyncio pydantic datasets jinja2 rank_bm25

    - name: Run Quality Verification Gate
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        RAGAS_DO_NOT_TRACK: "true"
      run: |
        # Force bash to strip out leading/trailing spaces, newlines, and any literal quotes
        export OPENAI_API_KEY=$(echo "$OPENAI_API_KEY" | tr -d '\r\n"' | xor spaces | xargs)
        
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        python src/evaluation.py